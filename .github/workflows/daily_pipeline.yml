name: Daily Pipeline

# Runs five times per day during baseball season, to cover varied game start
# times (day games, getaway-day afternoon games, evening games, and west
# coast night games whose lineups aren't posted until much later), plus an
# early-morning run that only logs the previous day's results.
#
#   6:00 AM ET  (10:00 UTC) — log results ONLY (no new predictions)
#   8:00 AM ET  (12:00 UTC) — full pipeline (log yesterday's results, then
#                              generate today's projections)
#  11:00 AM ET  (15:00 UTC) — full pipeline (day game lineups confirmed)
#   2:00 PM ET  (18:00 UTC) — full pipeline (afternoon games)
#   5:00 PM ET  (21:00 UTC) — full pipeline (evening games)

on:
  schedule:
    - cron: '0 10 * * *'   #  6:00 AM ET (10:00 UTC) — log results ONLY
    - cron: '0 12 * * *'   #  8:00 AM ET (12:00 UTC) — full pipeline
    - cron: '0 15 * * *'   # 11:00 AM ET (15:00 UTC) — full pipeline
    - cron: '0 18 * * *'   #  2:00 PM ET (18:00 UTC) — full pipeline
    - cron: '0 21 * * *'   #  5:00 PM ET (21:00 UTC) — full pipeline
  workflow_dispatch:         # manual trigger from the Actions tab (runs full pipeline)

permissions:
  contents: write   # needed to commit outputs back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Statcast store cache ───────────────────────────────────────────────
      # The raw Statcast parquet (112 MB, gitignored) must persist between runs.
      # Cache key is date-based: the first run each day saves a fresh entry;
      # subsequent same-day runs restore from it. restore-keys lets any run
      # fall back to the most recent prior-day entry if today's key is missing.
      - name: Get today's date for cache key
        id: cache-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore Statcast store cache
        id: cache-statcast
        uses: actions/cache@v4
        with:
          path: data/raw/statcast_pitching.parquet
          key: statcast-store-v1-${{ steps.cache-date.outputs.date }}
          restore-keys: |
            statcast-store-v1-

      # Cold start: runs when no exact-date cache exists.
      # If restore-keys found a partial/older store, we just call update() to
      # catch it up (fast: only pulls from last stored date → today).
      # If truly no store exists, we do the full historical backfill (slow, ~30 min).
      - name: Bootstrap Statcast store (cold start — skipped when cache hit)
        if: steps.cache-statcast.outputs.cache-hit != 'true'
        timeout-minutes: 90
        run: |
          mkdir -p data/raw
          python -c "
          import os
          from ingestion.fetch_statcast_pitching import STORE_PATH, backfill
          from ingestion.update_statcast_pitching import update as update_inc
          from datetime import date
          if os.path.exists(STORE_PATH):
              print('Partial store restored via restore-keys; catching up incrementally...')
              update_inc()
          else:
              print('True cold start: downloading full history 2021-present...')
              backfill(2021, date.today().year)
          "

      # ── Log yesterday's results ────────────────────────────────────────────
      # Reads yesterday's fair_odds CSV (committed by the previous pipeline run)
      # and writes actual K results to Neon. continue-on-error because a missing
      # CSV is legitimate on genuine off-days or when a date was skipped —
      # it must not block today's predictions from running.
      - name: Log yesterday's results
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m scripts.log_results

      # ── Generate today's predictions ───────────────────────────────────────
      # Skipped on the 6 AM run (log-only). NO continue-on-error: if this step
      # fails the whole job must show as a red X, not silently pass.
      - name: Generate today's predictions
        if: github.event.schedule != '0 10 * * *'
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY:    ${{ secrets.ODDS_API_KEY }}
          PARLAY_API_KEY:  ${{ secrets.PARLAY_API_KEY }}
          ODDS_PROVIDER:   parlay_api
        run: python -m scripts.daily_pipeline

      # ── Commit outputs ─────────────────────────────────────────────────────
      # Commits the new fair_odds CSV and results log back to the repo so
      # tomorrow's log_results step can find today's CSV. data/predictions/
      # is gitignored (within-job use only) and is intentionally omitted.
      - name: Commit pipeline outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/outputs/ data/logs/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto: pipeline $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      # ── Verify predictions are in the database ─────────────────────────────
      # Runs last so commit already happened even if this check fails.
      # Exits 1 (red X) if today's CSV exists but the DB has zero rows —
      # meaning predictions were generated but never written to Neon.
      # A zero-row CSV (genuine off-day) exits 0 (green) with a warning.
      - name: Verify predictions in database
        if: github.event.schedule != '0 10 * * *'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/verify_pipeline.py
