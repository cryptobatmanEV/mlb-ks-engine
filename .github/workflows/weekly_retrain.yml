name: Weekly Model Retrain

# Runs every Monday at 6 AM ET (10:00 UTC during EDT, April-October).
# Same convention as daily_pipeline.yml: no off-season adjustment, so this
# becomes 5 AM ET during EST (Nov-Mar) — fine since the offseason has no games.
on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:   # manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit the refreshed data and model back to the repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. Pull any newly completed Statcast pitching data and refresh
      #    this season's per-start pitcher game logs.
      - name: Get today's date for cache key
        id: cache-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore Statcast store cache
        id: cache-statcast
        uses: actions/cache@v4
        with:
          path: data/raw/statcast_pitching.parquet
          key: statcast-store-v1-${{ steps.cache-date.outputs.date }}
          restore-keys: |
            statcast-store-v1-

      - name: Bootstrap Statcast store (cold start — skipped when cache hit)
        if: steps.cache-statcast.outputs.cache-hit != 'true'
        timeout-minutes: 90
        run: |
          mkdir -p data/raw
          python -c "
          from ingestion.fetch_statcast_pitching import backfill
          from datetime import date
          backfill(2021, date.today().year)
          "

      - name: Update Statcast pitching data
        run: python -m ingestion.update_statcast_pitching

      - name: Update pitcher game logs
        run: python -m ingestion.fetch_pitcher_game_logs

      # Pull any newly played dates' starting lineups and home-plate umpires.
      - name: Update lineups and umpires
        run: python -m ingestion.fetch_lineups_umpires --update

      # 2. Recompute rolling pitcher/opponent/lineup/umpire features and
      #    rebuild the joined training dataset from the refreshed stores.
      - name: Rebuild features and training dataset
        run: |
          python -m features.pitcher_features
          python -m features.opponent_features
          python -m features.lineup_features
          python -m features.umpire_features
          python -m features.build_dataset

      # 3. Retrain the LightGBM Poisson model on 2021-2024, evaluate on the
      #    2025+ holdout, and overwrite models/saved/ks_model.pkl.
      - name: Retrain model
        run: python -m models.train

      # 4. Commit the refreshed data and model files.
      - name: Commit and push updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/statcast_pitching.parquet \
                  data/raw/pitcher_game_logs.parquet \
                  data/raw/lineups.parquet \
                  data/raw/officials.parquet \
                  data/processed/pitcher_features.parquet \
                  data/processed/opponent_features.parquet \
                  data/processed/lineup_features.parquet \
                  data/processed/umpire_features.parquet \
                  data/processed/umpire_lookup.parquet \
                  data/processed/training_dataset.parquet \
                  models/saved/ks_model.pkl
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Auto: weekly retrain $(date -u +'%Y-%m-%d')"
          git push
